<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Products - Online Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f7fa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
        }

        nav {
            background: #ffffff;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
        }

        .container {
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .product {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .product:hover {
            transform: translateY(-10px);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-content {
            padding: 15px;
            text-align: center;
        }

        .product h3 {
            margin-bottom: 10px;
        }

        .price {
            color: #2a5298;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1ebe5d;
        }

        footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Best Products</h1>
    <p>Your One-Stop Online Shopping Store</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="https://wa.me/ target="_blank">📞 +91 8847454858</a>
</nav>

<div class="container" id="products">
    <h2 style="text-align:center; margin-bottom: 30px;">Our Products</h2>
    <div class="products">
<footer>
    <p>© 2026 Best Products | All Rights Reserved</p>
</footer>
<!-- Product -->
<div class="product">
    <img src="https://images.meesho.com/images/products/409579286/kahxm_512.avif?width=360" alt="Stylish Product">
    <div class="product-content">
        <h3>Stylish Product</h3>
        <p class="price">₹899</p>
        <a class="btn" 
           href="https://wa.me/918847454858?text=I%20want%20to%20order%20Stylish%20Product" 
           target="_blank">
           Order Now
        </a>
    </div>
</div>
