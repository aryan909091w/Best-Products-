<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Products - Online Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f7fa;
            color: #333;
        }

        /* Header with Search Bar */
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            flex-direction: column;
        }

        .header-left h1 {
            font-size: 2rem;
        }

        .header-left p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Search Bar */
        .search-container {
            position: relative;
        }

        .search-container input {
            padding: 8px 35px 8px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
            width: 220px;
            font-size: 14px;
        }

        .search-container span {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #2a5298;
            font-size: 16px;
        }

        nav {
            background: #ffffff;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
        }

        .container {
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .no-products {
            font-size: 18px;
            color: #666;
            margin-top: 20px;
        }

        footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .search-container input {
                width: 180px;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div class="header-left">
        <h1>Best Products</h1>
        <p>Your One-Stop Online Shopping Store</p>
    </div>

    <!-- Right Side Search Bar -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search products...">
        <span>🔍</span>
    </div>
</header>

<!-- Navigation -->
<nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="https://wa.me/918847454858" target="_blank">Contact</a>
</nav>

<!-- Products Section (Empty) -->
<div class="container" id="products">
    <h2>Our Products</h2>
    <p class="no-products">No products available right now. Products will be added soon.</p>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 Best Products | All Rights Reserved</p>
</footer>

</body>
</html>
