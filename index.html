<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f7fa;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 26px;
            font-weight: 600;
        }

        /* Search Bar */
        .search-container {
            position: relative;
        }

        .search-container input {
            padding: 8px 35px 8px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
            width: 220px;
        }

        .search-container span {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #2a5298;
            font-size: 16px;
        }

        /* Main Section */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        .title {
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
        }

        /* Product Card */
        .products {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .product-card {
            background: white;
            padding: 20px;
            width: 260px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-8px);
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .price {
            color: #2a5298;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Button */
        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: #1ebe5d;
        }

        /* Footer */
        footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            .search-container input {
                width: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">Best Products</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search product..." onkeyup="searchProduct()">
            <span>🔍</span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <h2 class="title">Our Products</h2>
        <div class="products" id="productList">

            <!-- Product 1 -->
            <div class="product-card">
                <div class="product-name">Hoppup Xo3 Gaming Earbuds</div>
                <div class="price">₹899</div>
                <a href="details.html" class="btn">Order Now</a>
            </div>

            <!-- Aap yahan aur products bhi add kar sakte hain -->

        </div>
    </div>

    <!-- Footer -->
    <footer>
        © 2026 Best Products | All Rights Reserved
    </footer>

    <!-- Search Script -->
    <script>
        function searchProduct() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const products = document.getElementsByClassName('product-card');

            for (let i = 0; i < products.length; i++) {
                const name = products[i].querySelector('.product-name').innerText.toLowerCase();
                if (name.includes(input)) {
                    products[i].style.display = "block";
                } else {
                    products[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
