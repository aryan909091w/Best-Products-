<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Products - Online Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f7fa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
        }

        nav {
            background: #ffffff;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
        }

        .container {
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .product {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .product:hover {
            transform: translateY(-10px);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-content {
            padding: 15px;
            text-align: center;
        }

        .product h3 {
            margin-bottom: 10px;
        }

        .price {
            color: #2a5298;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1ebe5d;
        }

        footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Best Products</h1>
    <p>Your One-Stop Online Shopping Store</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="https://wa.me/919999999999" target="_blank">Contact</a>
</nav>

<div class="container" id="products">
    <h2 style="text-align:center; margin-bottom: 30px;">Our Products</h2>
    <div class="products">

        <!-- Product 1 -->
        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <div class="product-content">
                <h3>Wireless Earbuds</h3>
                <p class="price">₹999</p>
                <a class="btn" href="https://wa.me/919999999999?text=I want to order Wireless Earbuds">Order Now</a>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <div class="product-content">
                <h3>Smart Watch</h3>
                <p class="price">₹1499</p>
                <a class="btn" href="https://wa.me/919999999999?text=I want to order Smart Watch">Order Now</a>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <div class="product-content">
                <h3>LED Strip Light</h3>
                <p class="price">₹499</p>
                <a class="btn" href="https://wa.me/919999999999?text=I want to order LED Strip Light">Order Now</a>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Best Products | All Rights Reserved</p>
</footer>

</body>
</html>
