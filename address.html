            overflow: hidden;
        }

        .header {
            background: #1e3c72;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .form-container {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #555;
        }

        .required::after {
            content: " *";
            color: red;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: border 0.3s;
        }

            border-radius: 10px;

            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-continue:hover {
            opacity: 0.9;

            text-align: center;
            font-size: 12px;

                <input type="text" name="house" placeholder="House No., Building Name" required>
            </div>

            <div class="form-group">
                <label class="required">Road Name / Area / Colony</label>
                <input type="text" name="area" placeholder="Street, Area, Colony" required>
            </div>

            <div class="form-group">
                <label class="required">Pincode</label>
                <input type="text" name="pincode" placeholder="Enter 6-digit pincode" pattern="[0-9]{6}" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label class="required">City</label>
                    <input type="text" name="city" placeholder="City" required>
                </div>
                <div class="form-group">
                    <label class="required">State</label>
                    <input type="text" name="state" placeholder="State" required>
                </div>
            </div>

            <div class="form-group">
                <label>Nearby Famous Place / Shop / School (Optional)</label>
                <textarea name="landmark" rows="2" placeholder="Landmark (Optional)"></textarea>
            </div>

            <button type="submit" class="btn-continue">Continue</button>
        </form>

        <div class="footer-note">
            Your information is secure and will only be used for delivery purposes.
        </div>
    </div>
</div>

</body>
</html>
