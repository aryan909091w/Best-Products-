<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Address - Best Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #1e3c72;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .form-container {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #555;
        }

        .required::after {
            content: " *";
            color: red;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #1e3c72;
            outline: none;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .form-group {
            flex: 1;
        }

        .btn-continue {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #9c27b0, #e91e63);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-continue:hover {
            opacity: 0.9;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        @media (max-width: 500px) {
            .row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Edit Delivery Address</div>

    <div class="form-container">
        <form id="addressForm" action="payment.html" method="GET">
            
            <div class="row">
                <div class="form-group">
                    <label class="required">Name</label>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label class="required">Contact Number</label>
                    <input type="tel" name="phone" placeholder="Enter mobile number" pattern="[0-9]{10}" required>
                </div>
            </div>

            <div class="form-group">
                <label class="required">House No./ Building Name</label>
                <input type="text" name="house" placeholder="House No., Building Name" required>
            </div>

            <div class="form-group">
                <label class="required">Road Name / Area / Colony</label>
                <input type="text" name="area" placeholder="Street, Area, Colony" required>
            </div>

            <div class="form-group">
                <label class="required">Pincode</label>
                <input type="text" name="pincode" placeholder="Enter 6-digit pincode" pattern="[0-9]{6}" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label class="required">City</label>
                    <input type="text" name="city" placeholder="City" required>
                </div>
                <div class="form-group">
                    <label class="required">State</label>
                    <input type="text" name="state" placeholder="State" required>
                </div>
            </div>

            <div class="form-group">
                <label>Nearby Famous Place / Shop / School (Optional)</label>
                <textarea name="landmark" rows="2" placeholder="Landmark (Optional)"></textarea>
            </div>

            <button type="submit" class="btn-continue">Continue</button>
        </form>

        <div class="footer-note">
            Your information is secure and will only be used for delivery purposes.
        </div>
    </div>
</div>

</body>
</html>
